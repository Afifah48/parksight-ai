const MiniBarChart = ({data,height=120,barColor}) => {
    const max = Math.max(...data.map(d=>d.value),1);
    const w = 100/data.length;
    return (
        <svg viewBox={`0 0 100 ${height}`} className="w-full" preserveAspectRatio="none" style={{height}}>
            {data.map((d,i) => {
                const bh = (d.value/max)*(height-20);
                const c = barColor || d.color || "#3b82f6";
                return <g key={i}>
                    <rect x={i*w+w*0.15} y={height-bh-2} width={w*0.7} height={bh} rx={2} fill={c} opacity={0.85}/>
                    <text x={i*w+w/2} y={height-2} textAnchor="middle" fill="#64748b" fontSize={6} fontFamily="Inter">{d.label||""}</text>
                </g>;
            })}
        </svg>
    );
};

const DonutChart = ({segments,size=100,thickness=14}) => {
    const total = segments.reduce((s,d)=>s+d.value,0)||1;
    const r = (size-thickness)/2;
    const c = 2*Math.PI*r;
    let offset = 0;
    return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e293b" strokeWidth={thickness}/>
            {segments.map((seg,i)=>{
                const pct = seg.value/total;
                const dash = pct*c;
                const el = <circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={seg.color} strokeWidth={thickness}
                    strokeDasharray={`${dash} ${c-dash}`} strokeDashoffset={-offset} transform={`rotate(-90 ${size/2} ${size/2})`}
                    style={{transition:"stroke-dasharray .6s ease"}}/>;
                offset += dash;
                return el;
            })}
            <text x={size/2} y={size/2-4} textAnchor="middle" fill="#f8fafc" fontSize={16} fontWeight={700} fontFamily="Inter">{total}</text>
            <text x={size/2} y={size/2+10} textAnchor="middle" fill="#64748b" fontSize={8} fontFamily="Inter">TOTAL</text>
        </svg>
    );
};

const SparkBars = ({values=[],color="#3b82f6",h=40,w=80}) => {
    const max = Math.max(...values,1);
    const bw = w/values.length;
    return (
        <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
            {values.map((v,i)=><rect key={i} x={i*bw+1} y={h-(v/max)*h} width={bw-2} height={(v/max)*h} rx={1} fill={color} opacity={0.7+0.3*(v/max)}/>)}
        </svg>
    );
};

/* ═══════════════════════════════════════
   LEAFLET MAP COMPONENT
   ═══════════════════════════════════════ */
const LeafletMap = ({markers=[],center=[12.9716,77.5946],zoom=12,height="100%",showHeat=true,routeCoords,className=""}) => {
    const mapRef = useRef(null);
    const mapInstanceRef = useRef(null);

    useEffect(()=>{
        if(mapInstanceRef.current) { mapInstanceRef.current.remove(); mapInstanceRef.current=null; }
        if(!mapRef.current) return;
        const map = L.map(mapRef.current,{zoomControl:true,attributionControl:false}).setView(center,zoom);
        L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{maxZoom:19}).addTo(map);
        markers.forEach(m=>{
            const c = BAND_COLORS[m.band]||"#3b82f6";
            L.circleMarker([m.lat,m.lng],{radius:m.band==="Critical"?8:6,color:c,fillColor:c,fillOpacity:.7,weight:2})
             .bindTooltip(`<b>${m.name}</b><br/>Band: ${m.band}<br/>Violations: ${(m.violations||0).toLocaleString()}`,{className:"!bg-[#1e293b] !text-[#e2e8f0] !border-[#334155] !text-xs !rounded-lg !px-3 !py-2 !shadow-xl"})
             .addTo(map);
        });
        if(routeCoords && routeCoords.length>1){
            L.polyline(routeCoords,{color:"#22d3ee",weight:3,opacity:.8,dashArray:"8 6"}).addTo(map);
            routeCoords.forEach((coord,i)=>{
                L.marker(coord,{icon:L.divIcon({html:`<div style="background:${i===0?"#22c55e":"#3b82f6"};color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid #fff;box-shadow:0 0 8px rgba(0,0,0,.4)">${i+1}</div>`,iconSize:[20,20],iconAnchor:[10,10]})}).addTo(map);
            });
        }
        mapInstanceRef.current = map;
        setTimeout(()=>map.invalidateSize(),100);
        return ()=>{ if(mapInstanceRef.current){mapInstanceRef.current.remove();mapInstanceRef.current=null;} };
    },[markers.length,routeCoords?.length]);

    return <div ref={mapRef} className={`rounded-lg overflow-hidden ${className}`} style={{height,minHeight:200}}/>;
};

                                <button className="bg-accent-cyan text-bg text-[10px] font-semibold px-3 py-1 rounded hover:opacity-85">Execute</button>
                                <button className="bg-srf border border-brd text-txt-secondary text-[10px] font-semibold px-3 py-1 rounded hover:border-accent-cyan">Dismiss</button>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        </div>
    );
};

/* ═══════════════════════════════════════════════════════════
   PAGE: VEHICLE INTEL (Repeat Offenders — Screenshot 4)
   ═══════════════════════════════════════════════════════════ */
const VehicleIntel = () => {
    const [selIdx,setSelIdx] = useState(0);
    const sel = D.offenders[selIdx];
    const confScore = sel.score;
    const activityData = [{day:"Mon",critical:0,standard:3},{day:"Tue",critical:1,standard:1},{day:"Wed",critical:0,standard:2},{day:"Thu",critical:2,standard:0},{day:"Today",critical:1,standard:4}];
    const maxAct = Math.max(...activityData.map(d=>d.critical+d.standard),1);
    return (
        <div className="flex-1 overflow-y-auto p-4">
            <div className="grid grid-cols-12 gap-4 h-full">
                {/* Left: Offenders Table + Enforcement Card */}
                <div className="col-span-4 flex flex-col gap-4">
                    <div className="card p-4 flex-1">
                        <div className="flex items-center justify-between mb-3">
                            <div className="flex items-center gap-2"><Icon name="warning" size={16} className="text-status-critical"/><span className="text-sm font-bold text-txt-bright">Top Offenders (72h)</span></div>
                            <Icon name="filter_alt" size={16} className="text-txt-muted cursor-pointer hover:text-accent-cyan"/>
                        </div>
                        <table className="w-full text-[11px]">
                            <thead><tr className="text-[9px] text-txt-muted uppercase tracking-wide"><th className="text-left pb-2">Plate No.</th><th className="text-right pb-2">Violations</th><th className="text-center pb-2">Trend</th></tr></thead>
                            <tbody>{D.offenders.map((o,i)=>(
                                <tr key={i} className={`border-t border-brd-subtle cursor-pointer transition-colors ${selIdx===i?"bg-status-critical/[0.08]":"hover:bg-srf-hover"}`} onClick={()=>setSelIdx(i)}>
                                    <td className="py-2 font-mono font-semibold text-accent-cyan">{o.plate}</td>
                                    <td className="py-2 text-right font-mono font-bold text-status-critical">{o.violations}</td>
                                    <td className="py-2 text-center"><TrendArrow dir={o.trend}/></td>
                                </tr>
                            ))}</tbody>
                        </table>
                    </div>
                    {/* Enforcement Recommendation Card */}
                    <div className="card p-4 border-t-2 border-t-status-critical">
                        <div className="text-[9px] font-bold uppercase tracking-wide text-status-critical mb-2">Enforcement Recommendation</div>
                        <div className="text-lg font-bold text-txt-bright mb-2">Target: {sel.plate}</div>
                        <p className="text-[11px] text-txt-secondary leading-relaxed mb-3">
                            Vehicle has exceeded critical threshold ({sel.violations} violations in 72h). Primary offense: {sel.type} ({sel.location}).
                        </p>
                        <div className="mb-3">
                            <div className="flex justify-between mb-1"><span className="text-[9px] text-txt-muted">Confidence Score</span><span className="text-[10px] font-mono font-bold text-accent-cyan">{confScore.toFixed(1)}%</span></div>
                            <ProgressBar value={confScore} color="#22d3ee" h={5}/>
                        </div>
                        <div className="flex gap-2">
                            <button className="bg-status-critical text-white text-[10px] font-semibold px-3 py-1.5 rounded hover:opacity-85 flex items-center gap-1"><Icon name="flag" size={13}/> Flag for Towing</button>
                            <button className="bg-srf border border-brd text-txt-secondary text-[10px] font-semibold px-3 py-1.5 rounded hover:border-accent-cyan flex items-center gap-1"><Icon name="receipt_long" size={13}/> Issue Citation</button>
                        </div>
                    </div>
                </div>
                {/* Right: Map + Activity Timeline */}
                <div className="col-span-8 flex flex-col gap-4">
                    {/* Hotspot Visitation Map */}
                    <div className="card p-4 flex-1 flex flex-col">
                        <div className="flex items-center gap-2 mb-2">
                            <StatusDot color="#ef4444"/>
                            <span className="text-[11px] font-semibold text-txt-secondary">Hotspot Visitation: {sel.plate}</span>
                        </div>
                        <div className="flex-1 rounded-lg overflow-hidden border border-brd min-h-[300px]">
                            <LeafletMap markers={D.hotspots.slice(0,sel.hotspots+2)} height="100%" zoom={13}/>
                        </div>
                    </div>
                    {/* Activity Timeline */}
                    <div className="card p-4">
                        <div className="flex items-center justify-between mb-3">
                            <div className="flex items-center gap-2"><Icon name="show_chart" size={16} className="text-txt-muted"/><span className="text-[11px] font-bold text-txt-bright">Activity Timeline</span></div>
                            <div className="flex gap-4 text-[9px]">
                                <div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-status-critical"/><span className="text-txt-muted">Critical</span></div>
                                <div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-accent-blue"/><span className="text-txt-muted">Standard</span></div>
                            </div>
                        </div>
                        <svg viewBox="0 0 300 120" className="w-full" style={{height:120}}>
                            {activityData.map((d,i)=>{
                                const bw=50, x=i*60+5;
                                const critH=(d.critical/maxAct)*80, stdH=(d.standard/maxAct)*80;
                                return <g key={i}>
                                    <rect x={x} y={100-stdH-critH} width={20} height={critH} rx={2} fill="#ef4444" opacity={0.85}/>
                                    <rect x={x} y={100-stdH} width={20} height={stdH} rx={2} fill="#3b82f6" opacity={0.85}/>
                                    <rect x={x+24} y={100-stdH} width={20} height={stdH} rx={2} fill="#3b82f6" opacity={0.4}/>
                                    <text x={x+12} y={115} textAnchor="middle" fill="#64748b" fontSize={9} fontFamily="Inter">{d.day}</text>
                                </g>;
                            })}
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    );
};

/* ═══════════════════════════════════════════════════════════
   PAGE: PATROL PLANNER
   ═══════════════════════════════════════════════════════════ */
const PatrolPlanner = () => {
    const [selRoute,setSelRoute] = useState(0);
    const route = D.routes[selRoute];
    const routeCoords = D.hotspots.slice(selRoute*3,(selRoute+1)*3+1).map(h=>[h.lat,h.lng]);
    const allocMatrix = [
        {zone:"North CBD",slots:["OFC-12 (Patrol)","","OFC-12 (Static)","OFC-12 (Static)",""]},
        {zone:"Tech Park A",slots:["OFC-08 (Priority)","OFC-08 (Priority)","","OFC-24 (Relief)","OFC-24 (Relief)"]},
        {zone:"Outer Ring S",slots:["OFC-15 (Patrol)","OFC-15 (Patrol)","Break","OFC-15 (Patrol)",""]},
    ];
    const slotColors = {"Patrol":"bg-accent-blue","Priority":"bg-status-critical","Static":"bg-accent-indigo","Relief":"bg-accent-cyan text-bg","Break":"bg-srf-hover text-txt-muted"};
    return (
        <div className="flex-1 overflow-y-auto p-4">
            <div className="flex justify-between items-start mb-4">
                <div><h1 className="text-xl font-bold text-txt-bright">Shift Alpha Deployment</h1><p className="text-xs text-txt-secondary mt-0.5">⏱ 08:00 - 16:00 IST | 20 Jun 2026</p></div>
                <div className="flex gap-2">
                    <button className="bg-srf border border-brd text-txt-secondary text-[10px] font-semibold px-4 py-1.5 rounded hover:border-accent-cyan transition-colors">Export Plan</button>
                    <button className="bg-accent-cyan text-bg text-[10px] font-semibold px-4 py-1.5 rounded hover:opacity-85 transition-opacity">Execute Deployment</button>
                </div>
            </div>
            <div className="grid grid-cols-12 gap-4">
                {/* Left Panel */}
                <div className="col-span-3 flex flex-col gap-3">
                    <SectionHeader icon="local_police" title="Deployment Stats"/>
                    <div className="card p-3 grid grid-cols-2 gap-3">
                        <div><div className="text-[8px] text-txt-muted uppercase">Active Officers</div><div className="text-lg font-bold text-accent-cyan">42/50</div></div>
                        <div><div className="text-[8px] text-txt-muted uppercase">Zone Coverage</div><div className="text-lg font-bold text-txt-bright">84%</div></div>
                        <div><div className="text-[8px] text-txt-muted uppercase">High Priority</div><div className="text-lg font-bold text-accent-cyan">3 Routes</div></div>
                        <div><div className="text-[8px] text-txt-muted uppercase">Est. Response</div><div className="text-lg font-bold text-txt-bright">{"<"} 4m</div></div>
                    </div>
                    <SectionHeader icon="tune" title="Parameters"/>
                    <div className="card p-3">
                        <div className="text-[9px] text-txt-muted italic mb-1">Optimization Goal</div>
                        <select className="w-full bg-srf border border-brd rounded px-2 py-1.5 text-[11px] text-txt-DEFAULT focus:border-accent-cyan focus:ring-0 mb-3"><option>Max Coverage</option><option>Min Response Time</option><option>Priority Focus</option></select>
                        <div className="text-[9px] text-txt-muted italic mb-1">Congestion Weight</div>
                        <input type="range" min="0" max="100" defaultValue="80" className="w-full accent-accent-blue h-1 mb-1"/>
                        <div className="text-right text-[9px] text-txt-secondary">High (0.8)</div>
                        <button className="w-full mt-3 bg-accent-cyan text-bg text-[10px] font-semibold py-2 rounded hover:opacity-85 transition-opacity flex items-center justify-center gap-1"><Icon name="auto_awesome" size={14}/> Auto-Optimize</button>
                    </div>
                    <SectionHeader icon="map" title="Active Routes"/>
                    {D.routes.map((r,i)=>(
                        <div key={i} className={`card p-3 cursor-pointer transition-all ${selRoute===i?"border-accent-cyan":""}`} onClick={()=>setSelRoute(i)}>
                            <div className="flex justify-between items-start"><div><div className="text-[11px] font-semibold text-txt-bright">{r.zone}</div><div className="text-[9px] text-txt-muted mt-0.5">{r.id}</div></div><Badge band={r.band==="High"?"High":"Low"} small/></div>
                            <div className="flex items-center gap-1.5 text-[10px] text-txt-secondary mt-2"><Icon name="person" size={13}/>{r.officer}<span className="ml-auto">ETA: {r.eta}</span></div>
                        </div>
                    ))}
                </div>
                {/* Right — Map + Matrix */}
                <div className="col-span-9 flex flex-col gap-3">
                    <div className="card overflow-hidden flex-1 min-h-[350px]">
                        <LeafletMap markers={D.hotspots.slice(selRoute*3,(selRoute+1)*3+1)} routeCoords={routeCoords} zoom={13} height="100%"/>
                    </div>
                    <div className="flex items-center justify-between text-[9px] text-txt-muted px-1">
                        <span>Map Data: BTP Urban Sensors</span>
                        <div className="flex gap-4">{[["#3b82f6","Standard Route"],["#ef4444","Priority Action"]].map(([c,l])=><div key={l} className="flex items-center gap-1"><div className="w-2 h-2 rounded-full" style={{background:c}}/>{l}</div>)}</div>
                    </div>
                    <div className="card p-3">
                        <div className="flex justify-between items-center mb-3">
                            <SectionHeader icon="grid_on" title="Allocation Matrix" border={false}/>
                            <div className="flex items-center gap-3 text-[10px] text-txt-secondary"><span className="cursor-pointer">‹</span><span className="font-semibold">08:00 - 12:00</span><span className="cursor-pointer">›</span></div>
                        </div>
                        <table className="w-full text-[10px]">
                            <thead><tr className="text-[8px] text-txt-muted uppercase tracking-wide"><th className="text-left pb-2">Zone / Time</th>{["08:00","09:00","10:00","11:00","12:00"].map(t=><th key={t} className="text-center pb-2">{t}</th>)}</tr></thead>
                            <tbody>{allocMatrix.map((row,i)=>(
                                <tr key={i} className="border-t border-brd-subtle">
                                    <td className="py-1.5 font-semibold text-txt-DEFAULT">{row.zone}</td>
                                    {row.slots.map((s,j)=>{
                                        if(!s) return <td key={j}/>;
                                        const type = s.includes("Priority")?"Priority":s.includes("Static")?"Static":s.includes("Relief")?"Relief":s.includes("Break")?"Break":"Patrol";
                                        const bg = slotColors[type];
                                        return <td key={j} className="py-1 px-0.5"><span className={`inline-block px-2 py-0.5 rounded text-[9px] font-semibold text-white ${bg}`}>{s}</span></td>;
                                    })}
                                </tr>
                            ))}</tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    );
};

/* ═══════════════════════════════════════════════════════════
   PAGE: SIMULATOR
   ═══════════════════════════════════════════════════════════ */
const Simulator = () => {
    const [officers,setOfficers] = useState(8);
    const [intensity,setIntensity] = useState(0.8);
    const matched = D.roiScenarios.reduce((a,b)=>Math.abs(b.officers-officers)<Math.abs(a.officers-officers)?b:a);
    const baseline = 52.79;
    return (
        <div className="flex-1 overflow-y-auto p-4">
            <h1 className="text-xl font-bold text-txt-bright mb-4">Impact Simulator</h1>
            <div className="grid grid-cols-12 gap-4">
                {/* Controls */}
                <div className="col-span-3 flex flex-col gap-3">
                    <SectionHeader icon="tune" title="Parameters"/>
                    <div className="card p-3 flex flex-col gap-3">
                        <div>
                            <div className="flex justify-between text-[9px] text-txt-muted mb-1"><span>Additional Officers</span><span className="font-mono font-bold text-txt-bright">{officers}</span></div>
                            <input type="range" min="2" max="20" value={officers} onChange={e=>setOfficers(+e.target.value)} className="w-full accent-accent-blue h-1"/>
                        </div>
                        <div>
                            <div className="flex justify-between text-[9px] text-txt-muted mb-1"><span>Enforcement Intensity</span><span className="font-mono font-bold text-txt-bright">{intensity}×</span></div>
                            <input type="range" min="5" max="10" value={intensity*10} onChange={e=>setIntensity(+(e.target.value/10).toFixed(1))} className="w-full accent-accent-blue h-1"/>
                        </div>
                        <button className="w-full bg-accent-cyan text-bg text-[10px] font-semibold py-2 rounded hover:opacity-85 transition-opacity mt-2">Run Simulation</button>
                    </div>
                    <div className="card p-3">
                        <div className="text-[9px] font-bold text-txt-muted uppercase mb-2">Matched Scenario</div>
                        <div className="text-lg font-bold text-accent-cyan mb-3">{matched.id}</div>
                        {[["Officers",matched.officers],["Hotspots Targeted",matched.hotspots],["Patrol Visits/mo",matched.visits],["PCIS Reduction",matched.pcisReduction.toFixed(1)],["Hotspots Improved",matched.hotspotsImproved],["Offender Contacts",matched.offenderContacts]].map(([l,v])=>(
                            <div key={l} className="flex justify-between py-1 border-b border-brd-subtle last:border-0 text-[10px]"><span className="text-txt-secondary">{l}</span><span className="font-semibold text-txt-bright font-mono">{v}</span></div>
                        ))}
                    </div>
                </div>
                {/* Visualizations */}
                <div className="col-span-9 flex flex-col gap-3">
                    <div className="grid grid-cols-5 gap-3">
                        {[["Officers",officers,"person"],["Hotspots",matched.hotspots,"whatshot"],["PCIS Δ",`-${matched.pcisReduction.toFixed(1)}`,"trending_down"],["Improved",matched.hotspotsImproved,"check_circle"],["Contacts",matched.offenderContacts,"group"]].map(([l,v,ic],i)=>(
                            <div key={i} className="card p-3 text-center anim-fadein" style={{animationDelay:`${i*.05}s`}}>
                                <Icon name={ic} size={18} className="text-accent-cyan mx-auto mb-1"/><div className="text-lg font-bold text-txt-bright">{v}</div><div className="text-[9px] text-txt-muted uppercase">{l}</div>
                            </div>
                        ))}
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                        {/* Waterfall */}
                        <div className="card p-4">
                            <SectionHeader icon="waterfall_chart" title="PCIS Impact Projection" border={false}/>
                            <div className="flex items-end justify-center gap-6 h-[180px] mt-4">
                                <div className="flex flex-col items-center gap-1"><div className="bg-accent-blue rounded-t w-14" style={{height:`${(baseline/60)*150}px`}}/><span className="text-[9px] text-txt-muted">Baseline</span><span className="text-xs font-mono font-bold">{baseline}</span></div>
                                <div className="flex flex-col items-center gap-1"><div className="bg-status-critical rounded-t w-14" style={{height:`${(matched.pcisReduction/60)*150}px`}}/><span className="text-[9px] text-txt-muted">Reduction</span><span className="text-xs font-mono font-bold text-status-critical">-{matched.pcisReduction.toFixed(1)}</span></div>
                                <div className="flex flex-col items-center gap-1"><div className="bg-status-low rounded-t w-14" style={{height:`${((baseline-matched.pcisReduction)/60)*150}px`}}/><span className="text-[9px] text-txt-muted">After</span><span className="text-xs font-mono font-bold text-status-low">{(baseline-matched.pcisReduction).toFixed(1)}</span></div>
                            </div>
                        </div>
                        {/* Scenarios comparison */}
                        <div className="card p-4">
                            <SectionHeader icon="compare" title="All Scenarios" border={false}/>
                            <MiniBarChart height={200} data={D.roiScenarios.map(s=>({value:s.pcisReduction,label:`S${s.officers}`,color:s.id===matched.id?"#22d3ee":"#3b82f6"}))}/>
                        </div>
                    </div>
                    {/* Full table */}
                    <div className="card p-3">
                        <SectionHeader icon="table_chart" title="Scenario Comparison" border={false}/>
                        <div className="overflow-x-auto">
                            <table className="w-full text-[11px]">
                                <thead><tr className="text-[9px] text-txt-muted uppercase tracking-wide">{["ID","Officers","Hotspots","Visits/mo","Intensity","PCIS Δ","Improved","Contacts"].map(h=><th key={h} className="text-left pb-2 pr-3">{h}</th>)}</tr></thead>
                                <tbody>{D.roiScenarios.map(s=>(
                                    <tr key={s.id} className={`border-t border-brd-subtle ${s.id===matched.id?"bg-accent-cyan/[0.06]":"hover:bg-srf-hover"} transition-colors`}>
                                        <td className="py-1.5 font-mono font-semibold text-accent-cyan">{s.id}</td><td className="py-1.5 font-mono">{s.officers}</td><td className="py-1.5 font-mono">{s.hotspots}</td><td className="py-1.5 font-mono">{s.visits}</td><td className="py-1.5 font-mono">{s.intensity}×</td><td className="py-1.5 font-mono text-status-critical">-{s.pcisReduction.toFixed(1)}</td><td className="py-1.5 font-mono">{s.hotspotsImproved}</td><td className="py-1.5 font-mono">{s.offenderContacts}</td>
                                    </tr>
                                ))}</tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    );
};

/* ═══════════════════════════════════════════════════════════
   APP + ROUTING
   ═══════════════════════════════════════════════════════════ */
const titleMap = {"/":"Executive Dashboard","/intelligence":"Hotspot Intelligence","/operations":"Operations Center","/analytics":"Emerging Threats","/vehicle-intel":"Intelligence Module","/planning":"Patrol Planner","/simulator":"Impact Simulator"};

const App = () => {
    const location = useLocation();
    return (
        <div className="flex flex-col h-screen overflow-hidden">
            <TopNavBar title={titleMap[location.pathname]||"Dashboard"}/>
            <div className="flex flex-1 overflow-hidden">
                <SideNavBar/>
                <Routes>
                    <Route path="/" element={<ExecutiveDashboard/>}/>
                    <Route path="/intelligence" element={<HotspotIntelligence/>}/>
                    <Route path="/operations" element={<OperationsCenter/>}/>
                    <Route path="/analytics" element={<AnalyticsDashboard/>}/>
                    <Route path="/vehicle-intel" element={<VehicleIntel/>}/>
                    <Route path="/planning" element={<PatrolPlanner/>}/>

                </Routes>
            </div>

};

createRoot(document.getElementById("root")).render(<MemoryRouter><App/></MemoryRouter>);
</script>
